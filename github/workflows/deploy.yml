# .github/workflows/deploy.yml
name: CI/CD Pipeline
# TRIGGER: Run this workflow when code is pushed to main
on:
 push:
 branches: [ main ]
 pull_request:
 branches: [ main ]
# ENVIRONMENT VARIABLES available to all jobs
env:
 DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/my-django-app
jobs:
 # ============================================
 # JOB 1: TEST - Run all tests and linting
 # ============================================
 test:
 name: Run Tests
 runs-on: ubuntu-latest
 services:
 postgres:
 image: postgres:15
 env:
 POSTGRES_DB: test_db
 POSTGRES_USER: postgres
 POSTGRES_PASSWORD: postgres
 ports:
 - 5432:5432
 options: >-
 --health-cmd pg_isready
 --health-interval 10
 --health-timeout 5s
 --health-retries 5
 steps:
 - name: Checkout code
 uses: actions/checkout@v4
 - name: Set up Python
 uses: actions/setup-python@v5
 with:
 python-version: '3.11'
 - name: Install dependencies
 run: |
 python -m pip install --upgrade pip
 pip install -r requirements.txt
 - name: Run flake8 linting
 run: |
 flake8 app/ --max-line-length=120 --exclude=migrations
 - name: Run Django tests
 env:
 DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
 DJANGO_SECRET_KEY: test-secret-key-for-ci
 DJANGO_DEBUG: 'True'
 run: |
 cd app
 python manage.py test
 # ============================================
 # JOB 2: BUILD - Build and push Docker image
 # ============================================
 build:
 name: Build & Push Docker Image
 needs: test # Only runs if tests pass
 runs-on: ubuntu-latest
 if: github.ref == 'refs/heads/main' && github.event_name == 'push'
 steps:
 - name: Checkout code
 uses: actions/checkout@v4
 - name: Log in to Docker Hub
 uses: docker/login-action@v3
 with:
 username: ${{ secrets.DOCKER_USERNAME }}
 password: ${{ secrets.DOCKER_PASSWORD }}
 - name: Build and push Docker image
 uses: docker/build-push-action@v5
 with:
 context: .
 push: true
 tags: |
 ${{ env.DOCKER_IMAGE }}:latest
 ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
 # ============================================
 # JOB 3: DEPLOY - Deploy to GCP via OIDC
 # ============================================
 deploy:
 name: Deploy to GCP
 needs: build # Only runs if build succeeds
 runs-on: ubuntu-latest
 if: github.ref == 'refs/heads/main' && github.event_name == 'push'
 permissions:
 contents: read
 id-token: write # Required for OIDC token generation
 steps:
 - name: Checkout code
 uses: actions/checkout@v4
 - name: Authenticate to Google Cloud
 uses: google-github-actions/auth@v2
 with:
 workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
 service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
 - name: Set up Cloud SDK
 uses: google-github-actions/setup-gcloud@v2
 - name: Deploy to GCP
 run: |
 gcloud run deploy my-django-app \
 --image=${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
 --region=us-central1 \
 --platform=managed \
 --allow-unauthenticated
 echo 'Deployment to GCP completed successfully!'
